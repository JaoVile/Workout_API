services:
  db:
    image: postgres:14-alpine
    container_name: workout_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      # Valores definidos explicitamente aqui
      POSTGRES_USER: workout_user
      POSTGRES_PASSWORD: workout_password
      POSTGRES_DB: workout_db
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    networks:
      - workout_network
    # --- BLOCO ADICIONADO PARA VERIFICAR A SAÚDE DO BANCO ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout_user -d workout_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # --- FIM DO BLOCO ADICIONADO ---

  app:
    build: .
    container_name: workout_api
    volumes:
      - .:/app/
    ports:
      - "8000:8000"
    # --- LINHA MODIFICADA ---
    # Agora o 'app' só vai iniciar depois que o healthcheck do 'db' passar
    depends_on:
      db:
        condition: service_healthy
    # --- FIM DA MODIFICAÇÃO ---
    environment:
      # Variáveis para a aplicação. Note o HOST é 'db'
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: workout_user
      POSTGRES_PASSWORD: workout_password
      POSTGRES_DB: workout_db
    networks:
      - workout_network
    # Comando para rodar a aplicação DENTRO do contêiner
    command: uvicorn workout_api.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  workout_network:
    driver: bridge