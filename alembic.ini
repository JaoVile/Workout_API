[alembic]

# Caminho para a pasta de scripts de migração.
script_location = alembic

# Adiciona o diretório raiz do projeto ao sys.path do Python,
# permitindo que o env.py importe de 'workout_api'.
prepend_sys_path = .

# Caractere usado para separar a versão na nomenclatura dos arquivos.
version_path_separator = os

# A URL de conexão com o banco de dados.
# ESTA LINHA ESTÁ INTENCIONALMENTE COMENTADA.
# A configuração da URL agora é feita dinamicamente no arquivo 'alembic/env.py',
# que a obtém do 'workout_api/configs/settings.py'.
# Isso centraliza a configuração em um único lugar.
# sqlalchemy.url = postgresql+asyncpg://user:pass@host:port/dbname


[post_write_hooks]
# hooks =
# ...

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S